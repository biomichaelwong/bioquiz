<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>🔥 Daily Quiz Streak</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700&family=Noto+Sans+TC:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
</head>
<body>
<div class="app">

  <div class="topbar">
    <div class="streak">🔥 <span id="streakCount">0</span> <span data-i18n="streakLabel">day streak</span></div>
    <div class="topbar-right">
      <button id="langToggle" class="lang-btn">中文</button>
      <select id="dateSelect"></select>
    </div>
  </div>

  <div class="progress-wrap">
    <div class="progress-bar" id="progressBar"></div>
  </div>
  <p class="progress-label" id="progressLabel">Question 1 of 10</p>

  <div id="cardArea"></div>

  <div id="emailGate" class="card">
    <p id="emailPrompt">📧 Enter your email to save your results:</p>
    <input type="email" id="studentEmail" placeholder="you@example.com">
    <button class="btn primary" id="startBtn">Let's go! 🚀</button>
  </div>

  <div id="finishScreen" class="card" style="display:none;">
    <h2 id="finishTitle">🎉 Nice work!</h2>
    <p id="scoreText"></p>
    <button class="btn primary" id="sendEmailBtn">Send my results 📩</button>
    <p id="statusMsg"></p>
  </div>

</div>
<script src="script.js"></script>
</body>
</html>
